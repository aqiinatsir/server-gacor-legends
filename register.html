<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Gacor Legends</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <!-- Decorative glow orbs -->
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="register-container">
        <div class="logo-section">
            <img src="logo.jpeg" alt="Gacor Legends Logo">
            <h1>Gacor Legends</h1>
            <p>Buat Akun Baru</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="fullname">Nama Lengkap</label>
                <input type="text" id="fullname" name="fullname" placeholder="Masukkan nama lengkap" required>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Buat username" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Masukkan email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Buat password" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Konfirmasi Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Ulangi password" required>
            </div>

            <div class="form-group">
                <label for="minecraftName">Nama Minecraft</label>
                <input type="text" id="minecraftName" name="minecraftName" placeholder="Nama di Minecraft" required>
            </div>

            <div class="form-group">
                <label for="discord">Discord (Opsional)</label>
                <input type="text" id="discord" name="discord" placeholder="Username Discord">
            </div>

            <button type="submit" class="btn-register">Daftar</button>
        </form>

        <div class="login-link">
            <p>Sudah punya akun? <a href="login.html">Login Sekarang</a></p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fullname = document.getElementById('fullname').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const minecraftName = document.getElementById('minecraftName').value;
            const discord = document.getElementById('discord').value;
            
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            // Validation
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Password tidak cocok!';
                errorMessage.classList.add('show');
                setTimeout(() => errorMessage.classList.remove('show'), 3000);
                return;
            }
            
            if (password.length < 6) {
                errorMessage.textContent = 'Password minimal 6 karakter!';
                errorMessage.classList.add('show');
                setTimeout(() => errorMessage.classList.remove('show'), 3000);
                return;
            }
            
            // Get existing users
            let users = JSON.parse(localStorage.getItem('gacorUsers') || '[]');
            
            // Check if username already exists
            if (users.find(u => u.username === username)) {
                errorMessage.textContent = 'Username sudah digunakan!';
                errorMessage.classList.add('show');
                setTimeout(() => errorMessage.classList.remove('show'), 3000);
                return;
            }
            
            // Check if email already exists
            if (users.find(u => u.email === email)) {
                errorMessage.textContent = 'Email sudah terdaftar!';
                errorMessage.classList.add('show');
                setTimeout(() => errorMessage.classList.remove('show'), 3000);
                return;
            }
            
            // Create new user
            const newUser = {
                id: Date.now(),
                fullname,
                username,
                email,
                password,
                minecraftName,
                discord: discord || '',
                profileImage: 'logo.jpeg',
                createdAt: new Date().toISOString()
            };
            
            // Add to users array
            users.push(newUser);
            localStorage.setItem('gacorUsers', JSON.stringify(users));
            
            // Show success message
            successMessage.textContent = 'Registrasi berhasil! Mengalihkan ke login...';
            successMessage.classList.add('show');
            
            // Redirect to login after 2 seconds
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        });
    </script>
</body>
</html>
